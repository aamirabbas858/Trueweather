<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>True Weather</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>True Weather</h1>
    <p class="subtitle">Check the current weather anywhere in the world 🌍</p>

    <div class="input-row">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city (e.g. Berlin)"
        aria-label="City name"
      >
      <button id="checkBtn">Check</button>
    </div>
<button id="locationBtn">Use My Location</button>
    <p id="error" class="error"></p>

 <div class="result-wrapper">
  <img id="weatherIcon" class="weather-icon" alt="Weather icon" />
  <div id="result" class="card"></div>
</div>



    <footer class="footer">
      <span>Built by Abbas Aamir · Powered by OpenWeatherMap</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
